name: Build Check

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Go installieren
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Go Version anzeigen
        run: go version

      - name: Dependencies herunterladen
        run: go mod download

      - name: Build prüfen (kompilieren)
        run: go build ./...
